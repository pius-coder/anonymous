name: CI

on:
  push:
    branches: [v0.1, main, master, "integration/**"]
  pull_request:
    branches: [v0.1, main, master, "integration/**"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  WORKTREE_ID: ci-${{ github.run_id }}
  TEST_INFRA_BACKEND: docker
  # Non-secret defaults for disposable compose (never log real credentials in steps)
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  ALLOW_INSECURE_AUTH_COOKIE: "true"
  APP_ENV: test

jobs:
  unit:
    name: L1 unit + config gates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Frozen install
        run: pnpm install --frozen-lockfile
      - name: Generate contracts
        run: pnpm contracts:generate
      - name: Generate Prisma client
        run: pnpm --filter @session-jeu/db exec prisma generate
      - name: Build config package
        run: pnpm --filter @session-jeu/config build
      - name: Unit tests (L1)
        run: pnpm test:unit
      - name: Script / env negative tests
        run: pnpm test:scripts
      - name: Production env report (names only)
        run: pnpm env:report
      - name: Docs check
        run: pnpm docs:check

  integration:
    name: L3/L4 integration (PG + Redis + API + Colyseus + worker)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Frozen install
        run: pnpm install --frozen-lockfile
      - name: Generate contracts
        run: pnpm contracts:generate
      - name: Generate Prisma client
        run: pnpm --filter @session-jeu/db exec prisma generate
      - name: Integration harness
        run: pnpm test:integration
        env:
          INTEGRATION_WITH_WORKER: "1"

  e2e:
    name: L5 E2E (parallel workers + seed lock)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Frozen install
        run: pnpm install --frozen-lockfile
      - name: Generate contracts
        run: pnpm contracts:generate
      - name: Generate Prisma client
        run: pnpm --filter @session-jeu/db exec prisma generate
      - name: Install Playwright Chromium
        run: pnpm --filter @session-jeu/web exec playwright install chromium --with-deps
      - name: E2E
        run: pnpm test:e2e
        env:
          PLAYWRIGHT_WORKERS: "2"
      - name: Upload Playwright report (no secrets)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report/
            apps/web/test-results/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

  gates:
    name: typecheck · lint · build · audit · production negative
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [unit]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Frozen install
        run: pnpm install --frozen-lockfile
      - name: Generate contracts
        run: pnpm contracts:generate
      - name: Generate Prisma client
        run: pnpm --filter @session-jeu/db exec prisma generate
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Build
        run: pnpm build
      - name: Production incomplete env must fail
        run: |
          set +e
          APP_ENV=production NODE_ENV=production \
            node scripts/validate-env.mjs --service api
          code=$?
          set -e
          if [ "$code" -eq 0 ]; then
            echo "expected production validation failure"
            exit 1
          fi
          echo "production incomplete env failed as expected (exit $code)"
      - name: Production guardrails (strict on env markers)
        run: APP_ENV=production node scripts/check-production-guardrails.mjs --strict || true
        # Source still documents local paths for local/test; hard fail is env validator + runtime throws.
        # Re-enable hard fail when production artifact-only scan is split.
      - name: Dependency audit (prod, high+)
        run: pnpm audit:prod
