syntax = "proto3";

package sessionjeu.common.v1;

enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_INTERNAL = 1;
  ERROR_CODE_NOT_FOUND = 2;
  ERROR_CODE_ALREADY_EXISTS = 3;
  ERROR_CODE_INVALID_ARGUMENT = 4;
  ERROR_CODE_UNAUTHENTICATED = 5;
  ERROR_CODE_PERMISSION_DENIED = 6;
  ERROR_CODE_FAILED_PRECONDITION = 7;
  ERROR_CODE_RATE_LIMITED = 8;
  ERROR_CODE_CONFLICT = 9;
  ERROR_CODE_DEADLINE_EXCEEDED = 10;
  ERROR_CODE_CANCELLED = 11;
  ERROR_CODE_OUT_OF_RANGE = 12;
  ERROR_CODE_UNAVAILABLE = 13;
  ERROR_CODE_ABORTED = 14;
  ERROR_CODE_SESSION_EXPIRED = 15;
  ERROR_CODE_SESSION_REVOKED = 16;
  ERROR_CODE_WEAK_PASSWORD = 17;
  ERROR_CODE_INVALID_CREDENTIALS = 18;
  ERROR_CODE_INVALID_RESET_TOKEN = 19;
}

message ErrorDetail {
  ErrorCode code = 1;
  string message = 2;
  string domain = 3;
  repeated ErrorField violations = 4;
}

message ErrorField {
  string field = 1;
  string description = 2;
}
