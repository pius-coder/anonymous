syntax = "proto3";

package sessionjeu.common.v1;

message Empty {}

message UUID {
  string value = 1;
}

message Timestamp {
  int64 seconds = 1;
  int32 nanos = 2;
}

message Money {
  string currency = 1;
  int64 units = 2;
  int32 nanos = 3;
}

message PlayerId {
  string value = 1;
}

message PartyId {
  string value = 1;
}

message RoundId {
  string value = 1;
}

message CorrelationId {
  string value = 1;
}

message Pagination {
  int32 page = 1;
  int32 page_size = 2;
}

enum Audience {
  AUDIENCE_UNSPECIFIED = 0;
  AUDIENCE_PLAYER = 1;
  AUDIENCE_ADMIN = 2;
  AUDIENCE_READONLY_OBSERVER = 3;
  AUDIENCE_SYSTEM = 4;
}
