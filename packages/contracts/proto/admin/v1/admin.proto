syntax = "proto3";

package sessionjeu.admin.v1;

import "common/v1/shared.proto";
import "session/v1/session.proto";
import "participation/v1/participation.proto";

message GetAdminGameStateQuery {
  sessionjeu.common.v1.PartyId party_id = 1;
}

message ParticipantAdminDetail {
  sessionjeu.common.v1.PlayerId player_id = 1;
  string name = 2;
  string connection_status = 3;
  string participation_status = 4;
  bool is_ready = 5;
}

message AdminGameState {
  sessionjeu.session.v1.PartyConfig config = 1;
  sessionjeu.session.v1.PartyStatus status = 2;
  repeated ParticipantAdminDetail participants = 3;
  int32 participant_count = 4;
  int32 connected_count = 5;
  string current_round_id = 6;
  string current_phase = 7;
}

message GetAdminGameStateResponse {
  AdminGameState state = 1;
}

message GetReadonlySnapshotQuery {
  sessionjeu.common.v1.PartyId party_id = 1;
}

message AdminReadonlySnapshot {
  string party_name = 1;
  sessionjeu.session.v1.PartyStatus status = 2;
  int32 participant_count = 3;
  int32 round_count = 4;
  string current_phase = 5;
}

message GetReadonlySnapshotResponse {
  AdminReadonlySnapshot snapshot = 1;
}

message ListAdminPartiesQuery {
  int32 page_size = 1;
  string page_token = 2;
  sessionjeu.session.v1.PartyStatus status_filter = 3;
}

message ListAdminPartiesResponse {
  repeated AdminGameState parties = 1;
  string next_page_token = 2;
}

service AdminService {
  rpc GetGameState(GetAdminGameStateQuery) returns (GetAdminGameStateResponse);
  rpc GetReadonlySnapshot(GetReadonlySnapshotQuery) returns (GetReadonlySnapshotResponse);
  rpc ListParties(ListAdminPartiesQuery) returns (ListAdminPartiesResponse);
}
