syntax = "proto3";

package sessionjeu.notification.v1;

import "common/v1/shared.proto";

enum NotifChannel {
  NOTIF_CHANNEL_UNSPECIFIED = 0;
  NOTIF_CHANNEL_IN_APP = 1;
  NOTIF_CHANNEL_WHATSAPP = 2;
}

enum NotifDeliveryStatus {
  NOTIF_DELIVERY_STATUS_UNSPECIFIED = 0;
  NOTIF_DELIVERY_STATUS_QUEUED = 1;
  NOTIF_DELIVERY_STATUS_SENT = 2;
  NOTIF_DELIVERY_STATUS_DELIVERED = 3;
  NOTIF_DELIVERY_STATUS_READ = 4;
  NOTIF_DELIVERY_STATUS_FAILED = 5;
  NOTIF_DELIVERY_STATUS_SKIPPED = 6;
}

enum NotifType {
  NOTIF_TYPE_UNSPECIFIED = 0;
  NOTIF_TYPE_REGISTRATION = 1;
  NOTIF_TYPE_PAYMENT = 2;
  NOTIF_TYPE_CHECK_IN = 3;
  NOTIF_TYPE_RESULT = 4;
  NOTIF_TYPE_REMINDER = 5;
  NOTIF_TYPE_ANNOUNCEMENT = 6;
  NOTIF_TYPE_SYSTEM = 7;
}

message SendNotificationCommand {
  sessionjeu.common.v1.CorrelationId correlation_id = 1;
  sessionjeu.common.v1.PlayerId player_id = 2;
  NotifType type = 3;
  NotifChannel channel = 4;
  string title = 5;
  string body = 6;
}

message SendNotificationResponse {
  string notification_id = 1;
}

message NotificationSentEvent {
  string notification_id = 1;
  sessionjeu.common.v1.PlayerId player_id = 2;
  NotifType type = 3;
  NotifChannel channel = 4;
  sessionjeu.common.v1.Timestamp sent_at = 5;
}

message NotificationDeliveredEvent {
  string notification_id = 1;
  NotifDeliveryStatus status = 2;
  sessionjeu.common.v1.Timestamp delivered_at = 3;
}

message GetNotificationStatusQuery {
  string notification_id = 1;
}

message GetNotificationStatusResponse {
  NotifType type = 1;
  NotifDeliveryStatus status = 2;
  sessionjeu.common.v1.Timestamp sent_at = 3;
  sessionjeu.common.v1.Timestamp delivered_at = 4;
}

message ListNotificationsQuery {
  sessionjeu.common.v1.PlayerId player_id = 1;
  int32 page_size = 2;
  string page_token = 3;
}

message NotificationSummary {
  string notification_id = 1;
  NotifType type = 2;
  string title = 3;
  string body = 4;
  NotifDeliveryStatus status = 5;
  sessionjeu.common.v1.Timestamp sent_at = 6;
}

message ListNotificationsResponse {
  repeated NotificationSummary notifications = 1;
  string next_page_token = 2;
}

service NotificationService {
  rpc SendNotification(SendNotificationCommand) returns (SendNotificationResponse);
  rpc GetNotificationStatus(GetNotificationStatusQuery) returns (GetNotificationStatusResponse);
  rpc ListNotifications(ListNotificationsQuery) returns (ListNotificationsResponse);
}
