# Ephemeral overrides for integration/E2E (merged with docker-compose.yml).
# Project name and host ports come from WORKTREE_ID-derived env (scripts/lib/worktree-env.mjs).
# Teardown: docker compose -p $COMPOSE_PROJECT_NAME down -v

services:
  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-session_jeu}

  redis:
    ports:
      - "${REDIS_PORT:-6379}:6379"
